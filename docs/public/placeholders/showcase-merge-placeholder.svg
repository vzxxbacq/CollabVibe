<svg xmlns="http://www.w3.org/2000/svg" width="560" height="400" viewBox="0 0 560 400" role="img" aria-labelledby="title desc">
  <title id="title">Merge Conflict Resolution</title>
  <desc id="desc">Placeholder for a merge conflict resolution screenshot or GIF.</desc>
  <rect width="560" height="400" fill="#0f172a"/>
  <rect x="30" y="30" width="500" height="340" rx="20" fill="#111827" stroke="#334155" stroke-width="3"/>
  <!-- merge icon: two lines joining -->
  <line x1="180" y1="100" x2="280" y2="200" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <line x1="380" y1="100" x2="280" y2="200" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="200" x2="280" y2="260" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <circle cx="180" cy="100" r="10" fill="#a78bfa"/>
  <circle cx="380" cy="100" r="10" fill="#a78bfa"/>
  <circle cx="280" cy="260" r="10" fill="#a78bfa"/>
  <text x="280" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#e2e8f0">Merge Resolution</text>
  <text x="280" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Screenshot / GIF placeholder</text>
