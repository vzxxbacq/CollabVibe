name: phase1-ci

on:
  push:
  pull_request:

jobs:
  phase1-layers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:l0
      - run: npm run test:l1
      - run: npm run test:l2
      - run: npm run test:l3
      - run: npm run report:phase1
