name: phase2-ci

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  phase2-logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:logic && npm run test:e2e
  phase2-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:live:codex
      - run: npm run report:phase2
